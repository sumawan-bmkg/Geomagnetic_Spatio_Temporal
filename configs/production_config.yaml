# Production Training Configuration
# Spatio-Temporal Earthquake Precursor Detection

model:
  n_stations: 8
  n_components: 3
  efficientnet_pretrained: true
  gnn_hidden_dim: 256
  gnn_num_layers: 3
  dropout_rate: 0.2
  magnitude_classes: 5

data:
  batch_size: 8  # Reduced for production stability
  num_workers: 2  # Conservative for Windows
  pin_memory: true
  load_in_memory: false
  magnitude_bins: [4.0, 4.5, 5.0, 5.5, 6.0]

# Stage 1: Binary Precursor Detection
stage_1:
  epochs: 25
  patience: 8
  train_backbone: true
  train_gnn: true
  optimizer:
    type: AdamW
    lr: 0.0001
    weight_decay: 0.0001
    betas: [0.9, 0.999]
  scheduler:
    type: CosineAnnealingLR
    T_max: 25
    eta_min: 0.000001
  save_best: true
  checkpoint_interval: 5

# Stage 2: Magnitude Classification
stage_2:
  epochs: 30
  patience: 10
  load_previous_best: true
  train_backbone: true
  train_gnn: true
  optimizer:
    type: AdamW
    lr: 0.00005
    weight_decay: 0.0001
    betas: [0.9, 0.999]
  scheduler:
    type: CosineAnnealingLR
    T_max: 30
    eta_min: 0.000001
  save_best: true
  checkpoint_interval: 5

# Stage 3: Localization Estimation
stage_3:
  epochs: 35
  patience: 12
  load_previous_best: true
  train_backbone: true
  train_gnn: true
  optimizer:
    type: AdamW
    lr: 0.00002
    weight_decay: 0.0001
    betas: [0.9, 0.999]
  scheduler:
    type: CosineAnnealingLR
    T_max: 35
    eta_min: 0.000001
  save_best: true
  checkpoint_interval: 5

# Loss Configuration
loss_weights:
  binary_weight: 1.0
  magnitude_weight: 1.0
  localization_weight: 1.0
  focal_alpha: 1.0
  focal_gamma: 2.0

# Solar Storm Handling
conditional_masking:
  kp_threshold: 5.0  # Kp > 5 = solar storm
  mask_magnitude_learning: true
  mask_localization_learning: false