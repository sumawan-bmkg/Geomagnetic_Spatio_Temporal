# Physics-Informed Production Training Configuration
# Post-Bug Fix Recovery Configuration

# Model Configuration
model:
  backbone: 'efficientnet-b0'
  n_stations: 8  # Will be updated dynamically
  n_components: 3
  n_magnitude_classes: 5
  dropout: 0.3
  gnn_hidden_dim: 128
  gnn_layers: 2
  
# Data Configuration  
data:
  batch_size: 8  # Conservative for CPU training
  num_workers: 2  # Reduced for stability
  pin_memory: false  # CPU training
  magnitude_bins: [4.0, 4.5, 5.0, 5.5, 6.0]
  
# Training Configuration
training:
  # Stage 1: Binary Classification (Precursor vs Noise)
  stage_1:
    epochs: 25
    learning_rate: 0.0001
    weight_decay: 0.01
    patience: 10
    
  # Stage 2: Magnitude Classification  
  stage_2:
    epochs: 30
    learning_rate: 0.00005
    weight_decay: 0.01
    patience: 10
    
  # Stage 3: Localization (Azimuth + Distance)
  stage_3:
    epochs: 35
    learning_rate: 0.00002
    weight_decay: 0.01
    patience: 10

# Physics-Informed Constraints
physics:
  dobrovolsky_filter: true
  min_magnitude: 4.0
  max_distance_factor: 1.0  # R = 10^(0.43*M)
  
# Monitoring Configuration
monitoring:
  log_interval: 10  # Log every 10 batches
  checkpoint_interval: 5  # Save checkpoint every 5 epochs
  tensorboard: true
  early_stopping: true
  
# Memory Management
memory:
  gradient_accumulation_steps: 1
  mixed_precision: false  # Disabled for CPU
  max_memory_usage: 0.8  # 80% of available memory